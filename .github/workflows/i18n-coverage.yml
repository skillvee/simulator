name: i18n Coverage Test

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "src/**/*.tsx"
      - "src/**/*.ts"
      - "src/messages/**"
      - "tests/i18n-coverage.test.ts"
      - "scripts/run-i18n-coverage.ts"
      - ".github/workflows/i18n-coverage.yml"
  push:
    branches:
      - main

jobs:
  i18n-coverage:
    name: Check for English leaks in Spanish pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Setup environment
        run: |
          cp .env.example .env.local || touch .env.local
          echo "DATABASE_URL=postgresql://test:test@localhost:5432/testdb" >> .env.local
          echo "DIRECT_URL=postgresql://test:test@localhost:5432/testdb" >> .env.local
          echo "NEXTAUTH_SECRET=test-secret-for-ci" >> .env.local
          echo "NEXTAUTH_URL=http://localhost:3000" >> .env.local
          echo "E2E_TEST_MODE=true" >> .env.local
          echo "NEXT_PUBLIC_E2E_TEST_MODE=true" >> .env.local

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=testdb \
            -p 5432:5432 \
            postgres:15

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if docker exec postgres pg_isready -U test; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run database migrations
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb

      - name: Seed test database
        run: npx tsx prisma/seed.ts
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb

      - name: Run i18n coverage test
        run: npm run test:i18n
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-coverage-failures
          path: screenshots/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker stop postgres || true
          docker rm postgres || true